<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confessions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0ede8;
      min-height: 100vh;
    }

    #app {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      color: #2a2420;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .header h1 em {
      font-style: italic;
      color: #8b6f5e;
    }

    .header p {
      font-size: 13px;
      color: #9a8f87;
      margin-top: 8px;
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #7cb87c;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding: 0 2px;
    }

    .count-badge {
      font-size: 12px;
      color: #9a8f87;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #8b6f5e;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 10px;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: rgba(139,111,94,0.1); }

    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: rgba(255, 252, 249, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 0.5px solid rgba(200, 185, 175, 0.55);
      border-radius: 16px;
      padding: 1.3rem 1.5rem;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: fadeSlide 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(139,111,94,0.09);
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-text {
      font-size: 15px;
      line-height: 1.75;
      color: #2a2420;
    }

    .divider {
      width: 22px;
      height: 1px;
      background: rgba(200,185,175,0.6);
      margin: 12px 0;
    }

    .card-meta {
      font-size: 11.5px;
      color: #b0a49c;
      font-weight: 300;
      letter-spacing: 0.2px;
    }

    .skeleton-card {
      background: rgba(255,252,249,0.72);
      border: 0.5px solid rgba(200,185,175,0.4);
      border-radius: 16px;
      padding: 1.3rem 1.5rem;
    }

    .skeleton {
      background: linear-gradient(90deg,
        rgba(200,185,175,0.15) 25%,
        rgba(200,185,175,0.30) 50%,
        rgba(200,185,175,0.15) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 6px;
      height: 13px;
      margin-bottom: 9px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .s-long  { width: 88%; }
    .s-med   { width: 62%; }
    .s-short { width: 32%; height: 10px; margin-top: 14px; }

    .empty-state, .error-state {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 14px;
      font-weight: 300;
    }

    .empty-state { color: #b0a49c; }
    .error-state { color: #c97c5e; }
    .error-state small { color: #b0a49c; display: block; margin-top: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>anonymous <em>confessions</em></h1>
      <p><span class="live-dot"></span>live · refreshes every 30s</p>
    </div>

    <div class="status-bar">
      <span class="count-badge" id="count-label">Loading...</span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <span id="refresh-icon">↻</span> refresh
      </button>
    </div>

    <div class="feed" id="feed">
      <div class="skeleton-card"><div class="skeleton s-long"></div><div class="skeleton s-med"></div><div class="skeleton s-short"></div></div>
      <div class="skeleton-card"><div class="skeleton s-med"></div><div class="skeleton s-long"></div><div class="skeleton s-short"></div></div>
      <div class="skeleton-card"><div class="skeleton s-long"></div><div class="skeleton s-short"></div><div class="skeleton s-short"></div></div>
    </div>
  </div>

  <script>
    // ── CONFIG ─────────────────────────────────────────────
    const SHEET_ID   = '1zqSyqbcaw8cC3avHNWCPaRJ1tAqP-oeDpxconkL5vfQ';
    const SHEET_NAME = 'Sheet1';
    // ───────────────────────────────────────────────────────

    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

    function parseGVizDate(cell) {
      if (!cell) return '';
      if (cell.type === 'datetime' || cell.type === 'date') {
        const m = String(cell.v).match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
        if (m) {
          const d = new Date(+m[1], +m[2], +m[3], +(m[4]||0), +(m[5]||0), +(m[6]||0));
          return d.toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }
      }
      return cell.f || String(cell.v || '');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadData() {
      const icon = document.getElementById('refresh-icon');
      icon.className = 'spin';

      try {
        const res  = await fetch(URL + '&_=' + Date.now());
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^\{]+/, '').replace(/[^\}]+$/, ''));
        const cols = json.table.cols;
        const rows = json.table.rows;

        let tsCol = -1, confCol = -1;
        cols.forEach((c, i) => {
          const l = (c.label || '').toLowerCase();
          if (l.includes('timestamp') || l.includes('time') || l.includes('date')) tsCol = i;
          if (l.includes('confession') || l.includes('confess') || l.includes('message') || l.includes('text') || l.includes('response')) confCol = i;
        });

        if (tsCol   === -1) tsCol   = 0;
        if (confCol === -1) confCol = cols.length > 1 ? 1 : 0;

        const entries = rows
          .map(r => ({
            ts:   r.c[tsCol]   ? parseGVizDate(r.c[tsCol])   : '',
            text: r.c[confCol] ? (r.c[confCol].f || r.c[confCol].v || '') : ''
          }))
          .filter(e => String(e.text).trim())
          .reverse();

        const feed = document.getElementById('feed');
        if (!entries.length) {
          feed.innerHTML = '<div class="empty-state">No confessions yet.</div>';
        } else {
          feed.innerHTML = entries.map((e, i) => `
            <div class="card" style="animation-delay:${Math.min(i,10)*0.045}s">
              <p class="card-text">${esc(e.text)}</p>
              <div class="divider"></div>
              <p class="card-meta">${esc(e.ts)}</p>
            </div>
          `).join('');
        }

        document.getElementById('count-label').textContent =
          entries.length + ' confession' + (entries.length !== 1 ? 's' : '');

      } catch(err) {
        document.getElementById('feed').innerHTML = `
          <div class="error-state">
            Could not load confessions.
            <small>Make sure the sheet is set to "Anyone with the link can view".</small>
          </div>`;
        document.getElementById('count-label').textContent = '';
      } finally {
        icon.className = '';
      }
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
