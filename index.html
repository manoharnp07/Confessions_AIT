<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meme Soundboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Space Mono',monospace;background:#0e0e0e;color:#f0f0f0;min-height:100vh;padding:2rem 1.5rem}
  #topbar{display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap}
  #title{font-size:22px;font-weight:700;flex:1;letter-spacing:-0.5px}
  #search-wrap{display:none;align-items:center;gap:8px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:6px 12px;flex:1;max-width:320px}
  #search-wrap.open{display:flex}
  #search-wrap input{background:none;border:none;outline:none;font-family:inherit;font-size:14px;color:#f0f0f0;width:100%}
  #search-wrap input::placeholder{color:#555}
  #search-close{cursor:pointer;font-size:20px;color:#888;background:none;border:none;font-family:inherit;line-height:1}
  #hint{font-size:11px;color:#555;margin-bottom:1.25rem}
  #hint span{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:1px 6px}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .sound-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;cursor:pointer;transition:background 0.1s,border-color 0.1s,transform 0.08s;position:relative;overflow:hidden;color:inherit;font-family:inherit}
  .sound-btn:hover{background:#222;border-color:#444}
  .sound-btn.playing{border-color:#1D9E75;background:#0a2e22;transform:scale(0.97)}
  .sound-btn .key-badge{position:absolute;top:6px;right:7px;font-size:10px;font-weight:700;color:#555;background:#111;border:1px solid #2a2a2a;border-radius:4px;padding:1px 5px}
  .sound-btn .emoji{font-size:28px;line-height:1}
  .sound-btn .label{font-size:11px;color:#aaa;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
  #no-result{font-size:13px;color:#555;padding:2rem 0;text-align:center;display:none}
  #now-playing{margin-top:1.25rem;font-size:12px;color:#1D9E75;font-weight:700;letter-spacing:0.5px;min-height:18px}
</style>
</head>
<body>
<div id="topbar">
  <div id="title">🔊 MEME BOARD</div>
  <div id="search-wrap">
    <i class="ti ti-search" style="font-size:15px;color:#888"></i>
    <input id="search-input" placeholder="search sounds…" autocomplete="off"/>
    <button id="search-close">×</button>
  </div>
</div>
<div id="hint">Press a key to trigger sound &nbsp;<span>A–Z</span> &nbsp;|&nbsp; <span>Ctrl+F</span> to search</div>
<div id="grid"></div>
<div id="no-result">No memes found 💀</div>
<div id="now-playing"></div>

<script>
const SOUNDS = [
  {key:'a', label:'Bruh', emoji:'😑', url:'https://www.myinstants.com/media/sounds/bruh.mp3'},
  {key:'b', label:'Oof', emoji:'😬', url:'https://www.myinstants.com/media/sounds/oof.mp3'},
  {key:'c', label:'Sad Violin', emoji:'🎻', url:'https://www.myinstants.com/media/sounds/sad-violin.mp3'},
  {key:'d', label:'Vine Boom', emoji:'💥', url:'https://www.myinstants.com/media/sounds/vine-boom.mp3'},
  {key:'e', label:'Air Horn', emoji:'📯', url:'https://www.myinstants.com/media/sounds/airhorn_1.mp3'},
  {key:'f', label:'Fart', emoji:'💨', url:'https://www.myinstants.com/media/sounds/fart-with-reverb.mp3'},
  {key:'g', label:'Surprise', emoji:'😱', url:'https://www.myinstants.com/media/sounds/surprisemfkas.mp3'},
  {key:'h', label:'Wow', emoji:'🤩', url:'https://www.myinstants.com/media/sounds/wow.mp3'},
  {key:'i', label:'Trombone', emoji:'🎺', url:'https://www.myinstants.com/media/sounds/sad-trombone.mp3'},
  {key:'j', label:'Nope', emoji:'🙅', url:'https://www.myinstants.com/media/sounds/nope.mp3'},
  {key:'k', label:'Windows XP', emoji:'💻', url:'https://www.myinstants.com/media/sounds/windowsxp.mp3'},
  {key:'l', label:'Laugh', emoji:'😂', url:'https://www.myinstants.com/media/sounds/mlg-airhorn.mp3'},
  {key:'m', label:'MLG Horn', emoji:'🎮', url:'https://www.myinstants.com/media/sounds/mlg-airhorn.mp3'},
  {key:'n', label:'Buzzer', emoji:'🔔', url:'https://www.myinstants.com/media/sounds/wrong-answer-sound-effect.mp3'},
  {key:'o', label:'Clapping', emoji:'👏', url:'https://www.myinstants.com/media/sounds/clap.mp3'},
  {key:'p', label:'Crickets', emoji:'🦗', url:'https://www.myinstants.com/media/sounds/crickets.mp3'},
  {key:'q', label:'Yeet', emoji:'🚀', url:'https://www.myinstants.com/media/sounds/yeet.mp3'},
  {key:'r', label:'Run', emoji:'🏃', url:'https://www.myinstants.com/media/sounds/run-1.mp3'},
  {key:'s', label:'Siren', emoji:'🚨', url:'https://www.myinstants.com/media/sounds/alert.mp3'},
  {key:'t', label:'Tada', emoji:'🎉', url:'https://www.myinstants.com/media/sounds/ta-da.mp3'},
  {key:'u', label:'Uh Oh', emoji:'😳', url:'https://www.myinstants.com/media/sounds/uh-oh.mp3'},
  {key:'v', label:'Victory', emoji:'🏆', url:'https://www.myinstants.com/media/sounds/success-fanfare-trumpets.mp3'},
  {key:'w', label:'Whip', emoji:'🤙', url:'https://www.myinstants.com/media/sounds/whip-and-nae-nae.mp3'},
  {key:'x', label:'Explosion', emoji:'🔥', url:'https://www.myinstants.com/media/sounds/explosion.mp3'},
  {key:'y', label:'Yes', emoji:'✅', url:'https://www.myinstants.com/media/sounds/yes.mp3'},
  {key:'z', label:'Zzz', emoji:'😴', url:'https://www.myinstants.com/media/sounds/zzz.mp3'},
];

const grid = document.getElementById('grid');
const searchWrap = document.getElementById('search-wrap');
const searchInput = document.getElementById('search-input');
const searchClose = document.getElementById('search-close');
const noResult = document.getElementById('no-result');
const nowPlaying = document.getElementById('now-playing');
let currentAudio = null;
let currentBtn = null;

function playSound(sound, btn) {
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}
  if(currentBtn){currentBtn.classList.remove('playing');}
  const audio = new Audio(sound.url);
  currentAudio = audio;
  currentBtn = btn;
  btn.classList.add('playing');
  nowPlaying.textContent = '▶ ' + sound.emoji + ' ' + sound.label;
  audio.play().catch(()=>{
    nowPlaying.textContent = '⚠ Could not load: ' + sound.label;
  });
  audio.onended = ()=>{
    btn.classList.remove('playing');
    nowPlaying.textContent = '';
    currentBtn = null;
  };
}

function renderGrid(filter='') {
  grid.innerHTML = '';
  const q = filter.toLowerCase().trim();
  const filtered = q ? SOUNDS.filter(s=>s.label.toLowerCase().includes(q)||s.key===q) : SOUNDS;
  noResult.style.display = filtered.length===0?'block':'none';
  filtered.forEach(sound=>{
    const btn = document.createElement('button');
    btn.className = 'sound-btn';
    btn.innerHTML = `<span class="key-badge">${sound.key.toUpperCase()}</span><span class="emoji">${sound.emoji}</span><span class="label">${sound.label}</span>`;
    btn.addEventListener('click',()=>playSound(sound,btn));
    grid.appendChild(btn);
  });
}

renderGrid();

document.addEventListener('keydown', e=>{
  if(e.ctrlKey && e.key==='f'){
    e.preventDefault();
    searchWrap.classList.add('open');
    searchInput.focus();
    return;
  }
  if(e.target===searchInput) return;
  const k = e.key.toLowerCase();
  const sound = SOUNDS.find(s=>s.key===k);
  if(sound){
    const btns = grid.querySelectorAll('.sound-btn');
    const idx = SOUNDS.indexOf(sound);
    if(btns[idx]) playSound(sound, btns[idx]);
  }
});

searchInput.addEventListener('input',()=>renderGrid(searchInput.value));
searchClose.addEventListener('click',()=>{
  searchWrap.classList.remove('open');
  searchInput.value='';
  renderGrid();
});
searchInput.addEventListener('keydown',e=>{
  if(e.key==='Escape') searchClose.click();
  if(e.key==='Enter'){
    const q = searchInput.value.toLowerCase().trim();
    const match = SOUNDS.find(s=>s.label.toLowerCase().includes(q)||s.key===q);
    if(match){
      const btns = grid.querySelectorAll('.sound-btn');
      if(btns[0]) playSound(match,btns[0]);
    }
  }
});
</script>
</body>
</html>
